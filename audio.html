<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Simple Audio Visualizer</title>
  <style>
    body {
      margin: 0;
      background: #050816;
      color: #fff;
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: 10px;
    }

    #visualizer {
      border: 1px solid #444;
      background: #000;
    }

    .controls {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }
  </style>
</head>
<body>
  <div class="controls">
    <input type="file" id="fileInput" accept="audio/*" />
    <audio id="audio" controls></audio>
  </div>

  <canvas id="visualizer" width="800" height="300"></canvas>

  <script>
    const fileInput = document.getElementById("fileInput");
    const audio = document.getElementById("audio");
    const canvas = document.getElementById("visualizer");
    const ctx = canvas.getContext("2d");

    let audioContext;
    let analyser;
    let source;
    let dataArray;
    let bufferLength;

    fileInput.addEventListener("change", function () {
      const files = this.files;
      if (!files.length) return;

      const file = files[0];
      const fileURL = URL.createObjectURL(file);
      audio.src = fileURL;
      audio.play();

      if (!audioContext) {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
        analyser = audioContext.createAnalyser();
        analyser.fftSize = 256; // number of bars resolution
        bufferLength = analyser.frequencyBinCount;
        dataArray = new Uint8Array(bufferLength);

        source = audioContext.createMediaElementSource(audio);
        source.connect(analyser);
        analyser.connect(audioContext.destination);

        draw();
      }
    });

    function draw() {
      requestAnimationFrame(draw);

      if (!analyser) return;

      analyser.getByteFrequencyData(dataArray);

      ctx.fillStyle = "#000";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      const barWidth = (canvas.width / bufferLength) * 1.8;
      let x = 0;

      for (let i = 0; i < bufferLength; i++) {
        const barHeight = dataArray[i] * 1.2;

        const r = 50 + (i / bufferLength) * 205;
        const g = 100;
        const b = 255 - (i / bufferLength) * 205;

        ctx.fillStyle = `rgb(${r}, ${g}, ${b})`;
        ctx.fillRect(
          x,
          canvas.height - barHeight,
          barWidth,
          barHeight
        );

        x += barWidth + 1;
      }
    }
  </script>
</body>
</html>
